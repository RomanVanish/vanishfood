<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Превью на телефоне — Андрей Ванишевский</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#2b332f; --panel:#1f2521; --txt:#e8e2d4; --muted:#9aa39b; --accent:#EAA983; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #3a443e, transparent 60%),
      #232925;
    color: var(--txt);
    min-height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 56px;
  }
  .head { text-align: center; margin-bottom: 26px; max-width: 560px; }
  .head h1 { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 1.5rem; margin: 0 0 8px; letter-spacing: -0.01em; }
  .head p { color: var(--muted); font-size: 0.98rem; margin: 0; line-height: 1.6; }
  .head a { color: var(--accent); text-decoration: none; }

  .controls { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center; }
  .seg {
    display: inline-flex; background: rgba(255,255,255,0.06); border-radius: 100px; padding: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .seg button {
    font-family: 'Manrope', sans-serif; font-weight: 500; font-size: 0.9rem;
    color: var(--muted); background: none; border: none; cursor: pointer;
    padding: 8px 16px; border-radius: 100px; transition: 0.2s; white-space: nowrap;
  }
  .seg button.active { background: var(--accent); color: #2b332f; }

  /* Телефон */
  .phone-wrap { transition: transform 0.35s ease; transform-origin: top center; }
  .phone {
    position: relative;
    width: 390px; height: 844px;
    background: #0d0f0e;
    border-radius: 56px;
    padding: 13px;
    box-shadow:
      0 2px 0 2px #2a2f2c inset,
      0 0 0 2px #000,
      0 50px 90px -30px rgba(0,0,0,0.8),
      0 20px 50px -20px rgba(0,0,0,0.6);
  }
  .phone .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 44px;
    overflow: hidden;
    background: #E6DBC4;
  }
  .phone .notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 33px; background: #0d0f0e; border-radius: 100px; z-index: 10;
    pointer-events: none;
  }
  .phone iframe {
    width: 100%; height: 100%; border: none; display: block;
  }
  .side-btn { position: absolute; background: #14110e; border-radius: 3px; }
  .side-btn.power { right: -4px; top: 210px; width: 4px; height: 92px; }
  .side-btn.vol-up { left: -4px; top: 168px; width: 4px; height: 56px; }
  .side-btn.vol-dn { left: -4px; top: 238px; width: 4px; height: 56px; }

  .hint { color: var(--muted); font-size: 0.86rem; margin-top: 24px; text-align: center; }
  .hint b { color: var(--txt); font-weight: 600; }

  @media (max-width: 520px) {
    .phone-wrap { transform: scale(0.82); }
  }
</style>
</head>
<body>
  <div class="head">
    <h1>Так лендинг выглядит на телефоне</h1>
    <p>Живое мобильное превью — можно скроллить и нажимать прямо внутри.<br>
    Полную версию открыть: <a href="index.html" target="_blank" rel="noopener">index.html ↗</a></p>
  </div>

  <div class="controls">
    <div class="seg" id="sizeSeg">
      <button data-w="390" data-h="844" class="active">iPhone 14</button>
      <button data-w="430" data-h="932">iPhone Pro Max</button>
      <button data-w="360" data-h="780">Android</button>
      <button data-w="375" data-h="667">iPhone SE</button>
    </div>
  </div>

  <div class="phone-wrap" id="phoneWrap">
    <div class="phone" id="phone">
      <span class="side-btn vol-up"></span>
      <span class="side-btn vol-dn"></span>
      <span class="side-btn power"></span>
      <div class="screen">
        <div class="notch"></div>
        <iframe id="frame" src="index.html" title="Мобильное превью лендинга"></iframe>
      </div>
    </div>
  </div>

  <p class="hint">Совет: чтобы посмотреть на <b>своём телефоне</b> — попросите меня собрать автономный файл, я дам ссылку, которую можно открыть с телефона.</p>

<script>
  var seg = document.getElementById('sizeSeg');
  var phone = document.getElementById('phone');
  var wrap = document.getElementById('phoneWrap');

  function applySize(w, h) {
    phone.style.width = w + 'px';
    phone.style.height = h + 'px';
    fitScale(h);
  }
  function fitScale(h) {
    // чтобы телефон влезал по высоте окна
    var avail = window.innerHeight - 260;
    var phoneH = h + 26; // padding
    var scale = Math.min(1, avail / phoneH);
    wrap.style.transform = 'scale(' + scale + ')';
  }
  seg.addEventListener('click', function (e) {
    var b = e.target.closest('button');
    if (!b) return;
    seg.querySelectorAll('button').forEach(function (x) { x.classList.remove('active'); });
    b.classList.add('active');
    applySize(parseInt(b.dataset.w, 10), parseInt(b.dataset.h, 10));
  });
  window.addEventListener('resize', function () {
    var active = seg.querySelector('button.active');
    fitScale(parseInt(active.dataset.h, 10));
  });
  fitScale(844);
</script>
</body>
</html>
